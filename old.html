<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OWN 2026 Opens — Pool Seeding Walkthrough</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #19223a;
      --bg2: #1f2b48;
      --bg3: #263456;
      --border: #2e3f63;
      --text: #f2f5ff;
      --muted: #9aaabf;
      --pool-a: #5aace0;
      --pool-a-bg: #162d42;
      --pool-a-light: #8ecae6;
      --pool-b: #d43f50;
      --pool-b-bg: #3a1520;
      --pool-b-light: #e8838f;
      --group-a: #4ecdc4;
      --group-b: #a78bfa;
      --highlight: #fef08a;
      --highlight-bg: #3d3700;
      --wr: #5aace0;
      --nr: #7ec8e3;
      --er: #d43f50;
      --sr: #e8a0aa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .header-title span {
      color: var(--pool-a);
    }

    .step-counter {
      font-size: 0.85rem;
      color: var(--muted);
      background: var(--bg3);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .progress-bar {
      height: 3px;
      background: var(--bg3);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pool-a), var(--pool-b));
      transition: width 0.4s ease;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 20px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    .step-header {
      text-align: center;
    }

    .step-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .step-title {
      font-size: 1.7rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .step-subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 680px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .content-grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .card-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Region badges */
    .badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }
    .badge-WR { background: rgba(34,197,94,0.2); color: var(--wr); border: 1px solid rgba(34,197,94,0.3); }
    .badge-NR { background: rgba(96,165,250,0.2); color: var(--nr); border: 1px solid rgba(96,165,250,0.3); }
    .badge-ER { background: rgba(248,113,113,0.2); color: var(--er); border: 1px solid rgba(248,113,113,0.3); }
    .badge-SR { background: rgba(192,132,252,0.2); color: var(--sr); border: 1px solid rgba(192,132,252,0.3); }

    /* Team pill */
    .team-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg3);
      margin-bottom: 6px;
      transition: all 0.3s ease;
      cursor: default;
      position: relative;
    }

    .team-pill .team-name {
      font-weight: 600;
      font-size: 0.9rem;
      flex: 1;
    }

    .team-pill .seed-num {
      font-size: 0.72rem;
      color: var(--muted);
      min-width: 60px;
      text-align: right;
    }

    .team-pill.highlighted {
      background: var(--highlight-bg);
      border-color: var(--highlight);
      box-shadow: 0 0 0 1px var(--highlight), 0 0 16px rgba(254,240,138,0.15);
    }

    .team-pill.highlighted .team-name {
      color: var(--highlight);
    }

    .team-pill.group-a {
      border-left: 3px solid var(--group-a);
    }

    .team-pill.group-b {
      border-left: 3px solid var(--group-b);
    }

    .team-pill.pool-a {
      border-left: 3px solid var(--pool-a);
    }

    .team-pill.pool-b {
      border-left: 3px solid var(--pool-b);
    }

    /* Pool columns */
    .pools-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .pool-column {
      border-radius: 10px;
      padding: 14px;
      min-height: 200px;
    }

    .pool-a-col {
      background: rgba(59,130,246,0.06);
      border: 1px solid rgba(59,130,246,0.25);
    }

    .pool-b-col {
      background: rgba(245,158,11,0.06);
      border: 1px solid rgba(245,158,11,0.25);
    }

    .pool-header {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .pool-a-col .pool-header { color: var(--pool-a-light); }
    .pool-b-col .pool-header { color: var(--pool-b-light); }

    .pool-team {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      margin-bottom: 5px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: default;
      position: relative;
      transition: all 0.3s ease;
    }

    .pool-a-col .pool-team {
      background: rgba(59,130,246,0.12);
      color: var(--pool-a-light);
    }

    .pool-b-col .pool-team {
      background: rgba(245,158,11,0.12);
      color: var(--pool-b-light);
    }

    .pool-team.just-assigned {
      animation: popIn 0.4s ease forwards;
    }

    .pool-team.highlighted-in-pool {
      box-shadow: 0 0 0 1px var(--highlight), 0 0 10px rgba(254,240,138,0.2);
    }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Rationale tooltip */
    .rationale-btn {
      font-size: 0.65rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 2px 6px;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .rationale-btn:hover { color: var(--text); border-color: var(--muted); }

    .rationale-text {
      display: none;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
      padding: 6px 8px;
      background: var(--bg);
      border-radius: 4px;
      border-left: 2px solid var(--border);
      line-height: 1.5;
    }

    .rationale-text.visible { display: block; }

    /* Snake seeding visualization */
    .snake-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 8px 0;
    }

    .snake-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      min-width: 72px;
      flex: 1;
      transition: all 0.3s ease;
    }

    .snake-box .snake-num {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .snake-box .snake-name {
      font-size: 0.8rem;
      font-weight: 700;
      text-align: center;
    }

    .snake-box .snake-group {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .snake-box.group-a-box {
      background: rgba(16,185,129,0.08);
      border-color: rgba(16,185,129,0.3);
    }

    .snake-box.group-b-box {
      background: rgba(139,92,246,0.08);
      border-color: rgba(139,92,246,0.3);
    }

    .snake-box.group-a-box .snake-group {
      background: rgba(16,185,129,0.2);
      color: var(--group-a);
    }

    .snake-box.group-b-box .snake-group {
      background: rgba(139,92,246,0.2);
      color: var(--group-b);
    }

    .snake-box.highlighted-snake {
      box-shadow: 0 0 0 2px var(--highlight), 0 0 16px rgba(254,240,138,0.2);
    }

    /* Arrow between snake boxes */
    .snake-arrows {
      display: flex;
      gap: 8px;
      margin: 2px 0;
      flex-wrap: wrap;
    }

    .snake-arrow {
      width: 72px;
      flex: 1;
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
    }

    /* Rule steps */
    .rule-card {
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }

    .rule-card.active {
      border-color: var(--highlight);
      background: var(--highlight-bg);
    }

    .rule-card.inactive {
      opacity: 0.45;
    }

    .rule-card.passed {
      border-color: rgba(16,185,129,0.4);
      background: rgba(16,185,129,0.05);
    }

    .rule-num {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .rule-card.active .rule-num { color: var(--highlight); }
    .rule-card.passed .rule-num { color: var(--group-a); }
    .rule-card.inactive .rule-num { color: var(--muted); }

    .rule-text {
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .rule-result {
      margin-top: 6px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .rule-card.active .rule-result { color: var(--highlight); }
    .rule-card.passed .rule-result { color: var(--group-a); }

    /* Reference table */
    .ref-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.83rem;
    }

    .ref-table th {
      text-align: left;
      padding: 6px 10px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .ref-table td {
      padding: 7px 10px;
      border-bottom: 1px solid rgba(46,51,71,0.5);
    }

    .ref-table tr.highlighted-row td {
      background: var(--highlight-bg);
      color: var(--highlight);
    }

    .ref-table tr.group-a-row td:last-child {
      color: var(--group-a);
      font-weight: 700;
    }

    .ref-table tr.group-b-row td:last-child {
      color: var(--group-b);
      font-weight: 700;
    }

    .group-a-label { color: var(--group-a); font-weight: 700; }
    .group-b-label { color: var(--group-b); font-weight: 700; }
    .pool-a-label { color: var(--pool-a-light); font-weight: 700; }
    .pool-b-label { color: var(--pool-b-light); font-weight: 700; }

    /* Region being considered indicator */
    .regions-active {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .regions-active-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .region-active-badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 5px;
      animation: pulse 2s ease infinite;
    }

    .region-active-badge.WR { background: rgba(34,197,94,0.25); color: var(--wr); border: 1px solid rgba(34,197,94,0.5); }
    .region-active-badge.NR { background: rgba(96,165,250,0.25); color: var(--nr); border: 1px solid rgba(96,165,250,0.5); }
    .region-active-badge.ER { background: rgba(248,113,113,0.25); color: var(--er); border: 1px solid rgba(248,113,113,0.5); }
    .region-active-badge.SR { background: rgba(192,132,252,0.25); color: var(--sr); border: 1px solid rgba(192,132,252,0.5); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.65; }
    }

    /* Nav */
    nav {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:hover { background: var(--border); border-color: var(--muted); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-primary {
      background: var(--pool-a);
      border-color: var(--pool-a);
      color: #fff;
    }

    .btn-primary:hover { background: #2563eb; border-color: #2563eb; }

    .btn-skip {
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      padding: 8px 16px;
    }

    .btn-skip:hover { color: var(--text); }

    /* Key/legend */
    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      padding: 12px 16px;
      background: var(--bg3);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Info box */
    .info-box {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.83rem;
      line-height: 1.6;
      color: var(--muted);
    }

    .info-box strong { color: var(--text); }

    .info-box.note {
      border-left: 3px solid var(--pool-a);
    }
    .info-box.warn  { border-left: 3px solid var(--highlight); background: rgba(61,55,0,0.4); }

    /* Fade transition */
    .step-content {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .ow25-orig {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .assigned-tag {
      font-size: 0.65rem;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 700;
    }

    .tag-a { background: rgba(59,130,246,0.2); color: var(--pool-a-light); }
    .tag-b { background: rgba(245,158,11,0.2); color: var(--pool-b-light); }

    .empty-pool {
      color: var(--muted);
      font-size: 0.8rem;
      font-style: italic;
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-title">OWN 2026 Opens — <span>Pool Seeding</span> Walkthrough</div>
    <div class="step-counter" id="stepCounter">Step 1 of 9</div>
  </header>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 11%"></div>
  </div>

  <main>
    <div class="step-header" id="stepHeader">
      <div class="step-label" id="stepLabel">Step 1 of 9</div>
      <div class="step-title" id="stepTitle"></div>
      <div class="step-subtitle" id="stepSubtitle"></div>
    </div>

    <div class="step-content" id="stepContent"></div>
  </main>

  <nav>
    <button class="btn" id="btnPrev" onclick="navigate(-1)" disabled>← Previous</button>
    <button class="btn btn-skip" id="btnBackToStart" onclick="backToStart()">↑ Back to start</button>
    <button class="btn btn-skip" id="btnSkip" onclick="skipToEnd()">Skip to end ↓</button>
    <button class="btn btn-primary" id="btnNext" onclick="navigate(1)">Next →</button>
  </nav>

  <script>
    // ─── Data ────────────────────────────────────────────────────────────────

    const REGIONS = {
      WR: { label: 'WR', name: 'Western Region', color: '#22c55e' },
      NR: { label: 'NR', name: 'Northern Region', color: '#60a5fa' },
      ER: { label: 'ER', name: 'Eastern Region', color: '#f87171' },
      SR: { label: 'SR', name: 'Southern Region', color: '#c084fc' },
    };

    const ALL_TEAMS = [
      { name: 'Mutiny',  region: 'WR', regSeed: 1, own25: 1,  own25Renum: 1, refGroup: 'A', pool: 'B', noOwn25Rule: null },
      { name: 'Bunnies', region: 'ER', regSeed: 1, own25: 6,  own25Renum: 4, refGroup: 'A', pool: 'B', noOwn25Rule: null },
      { name: 'Kaalvoet',region: 'NR', regSeed: 2, own25: 7,  own25Renum: 5, refGroup: 'A', pool: 'B', noOwn25Rule: null },
      { name: 'Rex',     region: 'NR', regSeed: 1, own25: 3,  own25Renum: 2, refGroup: 'B', pool: 'A', noOwn25Rule: null },
      { name: 'Maties',  region: 'WR', regSeed: 3, own25: 5,  own25Renum: 3, refGroup: 'B', pool: 'A', noOwn25Rule: null },
      { name: 'Gradient',region: 'WR', regSeed: 4, own25: 8,  own25Renum: 6, refGroup: 'B', pool: 'A', noOwn25Rule: null },
      { name: 'UFH',     region: 'SR', regSeed: 1, own25: 10, own25Renum: 7, refGroup: 'B', pool: 'A', noOwn25Rule: null },
      { name: 'Zephyr',  region: 'WR', regSeed: 2, own25: null, own25Renum: null, refGroup: null, pool: 'A', noOwn25Rule: { rule: 1, reason: 'WR1 Mutiny is in Pool B — Zephyr (WR2) must be in a different pool from their region\'s 1st seed.' } },
      { name: 'Wits',    region: 'NR', regSeed: 3, own25: null, own25Renum: null, refGroup: null, pool: 'B', noOwn25Rule: { rule: 2, reason: 'Maties finished 3rd at WR Regionals and is in Pool A — Wits goes to the opposite pool.' } },
      { name: 'SA u20',  region: 'ER', regSeed: 2, own25: null, own25Renum: null, refGroup: null, pool: 'A', noOwn25Rule: { rule: 1, reason: 'ER1 Bunnies is in Pool B — SA u20 (ER2) must be in a different pool from their region\'s 1st seed.' } },
      { name: 'ManCubs', region: 'WR', regSeed: 5, own25: null, own25Renum: null, refGroup: null, pool: 'B', noOwn25Rule: { rule: 3, reason: 'No team from another region finished 5th at Regionals. WR already has Zephyr, Maties, Gradient in Pool A; Mutiny in Pool B. ManCubs goes to Pool B for regional balance.' } },
    ];

    const OWN25_TEAMS = ALL_TEAMS.filter(t => t.own25 !== null).sort((a, b) => a.own25Renum - b.own25Renum);
    const NO_OWN25_TEAMS = [
      ALL_TEAMS.find(t => t.name === 'Zephyr'),
      ALL_TEAMS.find(t => t.name === 'SA u20'),
      ALL_TEAMS.find(t => t.name === 'Wits'),
      ALL_TEAMS.find(t => t.name === 'ManCubs'),
    ];

    // Pool state per step (which teams are assigned at each step)
    // Step indices: 0=intro, 1=regionals, 2=own25ref, 3=snake, 4=assign-own25, 5=zephyr, 6=sa-u20, 7=wits, 8=mancubs-final
    const STEP_POOL_STATE = [
      { A: [], B: [] }, // 0
      { A: [], B: [] }, // 1
      { A: [], B: [] }, // 2
      { A: [], B: [] }, // 3
      { A: ['Rex','Maties','Gradient','UFH'], B: ['Mutiny','Bunnies','Kaalvoet'] }, // 4
      { A: ['Rex','Maties','Gradient','UFH','Zephyr'], B: ['Mutiny','Bunnies','Kaalvoet'] }, // 5
      { A: ['Rex','Maties','Gradient','UFH','Zephyr','SA u20'], B: ['Mutiny','Bunnies','Kaalvoet'] }, // 6
      { A: ['Rex','Maties','Gradient','UFH','Zephyr','SA u20'], B: ['Mutiny','Bunnies','Kaalvoet','Wits'] }, // 7
      { A: ['Rex','Maties','Gradient','UFH','Zephyr','SA u20'], B: ['Mutiny','Bunnies','Kaalvoet','Wits','ManCubs'] }, // 8
    ];

    function teamData(name) { return ALL_TEAMS.find(t => t.name === name); }

    // ─── Helpers ─────────────────────────────────────────────────────────────

    function badge(region) {
      return `<span class="badge badge-${region}">${region}</span>`;
    }

    function regionActiveBadge(region) {
      return `<span class="region-active-badge ${region}">${REGIONS[region].name} (${region})</span>`;
    }

    function poolTeamHTML(name, isNew = false, showRationale = false) {
      const t = teamData(name);
      const rationale = t.own25 !== null
        ? `OWN25 placing: ${t.own25} → re-numbered ${t.own25Renum} → Group ${t.refGroup} → Pool ${t.pool}`
        : t.noOwn25Rule ? `Rule ${t.noOwn25Rule.rule}: ${t.noOwn25Rule.reason}` : '';

      return `

                <strong>Goal 3 — Keep regional representation balanced.</strong> Rule 2 (regional balance) ensures no pool ends up stacked with teams from a single region. Applied to ManCubs, it prevents WR from going 4–1 across the pools.
              </div>
              <div class="info-box note">
                <strong>Goal 4 — Spread similarly-ranked teams across pools.</strong> Rule 3 (combination seeding) resolves placements when Goals 1–3 don't determine them. Applied here for Wits, whose combined score matches Gradient in Pool A.
              </div>
            </div>
          `;
        }
      },
    ];

    // ─── State & Navigation ───────────────────────────────────────────────

    let currentStep = 0;

    function render() {
      const step = STEPS[currentStep];
      const total = STEPS.length;
      const stepNum = currentStep + 1;

      document.getElementById('stepCounter').textContent = `Step ${stepNum} of ${total}`;
      document.getElementById('stepLabel').textContent = `Step ${stepNum} of ${total} — ${step.label}`;
      document.getElementById('stepTitle').textContent = step.title;
      document.getElementById('stepSubtitle').textContent = step.subtitle;
      document.getElementById('progressFill').style.width = `${(stepNum / total) * 100}%`;

      const content = document.getElementById('stepContent');
      content.className = 'step-content';
      content.innerHTML = step.render();
      // Re-trigger animation
      void content.offsetWidth;

      document.getElementById('btnPrev').disabled = currentStep === 0;
      document.getElementById('btnNext').disabled = currentStep === total - 1;
      document.getElementById('btnNext').textContent = currentStep === total - 2 ? 'Final Result →' : 'Next →';
      document.getElementById('btnSkip').style.display = currentStep === total - 1 ? 'none' : '';
      document.getElementById('btnBackToStart').style.display = currentStep === 0 ? 'none' : '';
    }

    function navigate(dir) {
      const next = currentStep + dir;
      if (next >= 0 && next < STEPS.length) {
        currentStep = next;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function backToStart() {
      currentStep = 0;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function skipToEnd() {
      currentStep = STEPS.length - 1;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate(-1);
    });

    render();
  </script>
</body>
</html>
